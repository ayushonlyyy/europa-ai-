<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Europa AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #050505;
      --bg2:         #0d0d0d;
      --bg3:         #141414;
      --bg4:         #0f0f0f;
      --border:      rgba(255,255,255,0.06);
      --border2:     rgba(255,255,255,0.13);
      --text:        #ffffff;
      --text2:       rgba(255,255,255,0.45);
      --text3:       rgba(255,255,255,0.2);
      --user-bubble: #1a1a1a;
      --ai-bubble:   #0d0d0d;
      --scroll:      rgba(255,255,255,0.06);
      --sidebar-w:   280px;
      --header-h:    62px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Sora', sans-serif; font-size: 15px; line-height: 1.6; overflow: hidden; }

    /* ── Loading Screen ── */
    #loading-screen {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 18px;
      transition: opacity 0.35s ease;
    }
    #loading-screen.hide { opacity: 0; pointer-events: none; }
    .loading-logo { display: flex; align-items: center; gap: 10px; }
    .loading-logo span { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
    .loading-bar {
      width: 120px; height: 2px; background: var(--bg3); border-radius: 2px; overflow: hidden;
    }
    .loading-bar-fill {
      height: 100%; width: 0%; background: linear-gradient(90deg, rgba(255,255,255,0.3), rgba(255,255,255,0.55), rgba(255,255,255,0.3));
      animation: loadBar 1.2s ease forwards;
      border-radius: 2px;
    }
    @keyframes loadBar { to { width: 100%; } }

    /* ── Auth Overlay ── */
    #auth-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: var(--bg);
      display: none; align-items: center; justify-content: center; padding: 1rem;
    }
    #auth-overlay.visible { display: flex; animation: fadeIn 0.35s ease both; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .auth-card {
      width: 100%; max-width: 400px;
      background: var(--bg2);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 20px; padding: 2.2rem 2rem 2rem;
      box-shadow: 0 40px 80px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.03) inset;
      animation: slideUp 0.45s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes slideUp { from { opacity:0; transform:translateY(22px); } to { opacity:1; transform:none; } }

    .auth-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 1.6rem; }
    .auth-logo-text { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }

    .auth-tabs { display: flex; background: var(--bg3); border-radius: 10px; padding: 4px; margin-bottom: 1.5rem; }
    .auth-tab {
      flex: 1; padding: 8px; border: none; background: none;
      color: var(--text2); font-family: 'Sora', sans-serif;
      font-size: 13px; font-weight: 500; border-radius: 8px; cursor: pointer; transition: all 0.2s;
    }
    .auth-tab.active { background: #1e1e1e; color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.4); }

    .auth-form { display: flex; flex-direction: column; gap: 12px; }
    .auth-form.hidden { display: none; }
    .auth-input-group { display: flex; flex-direction: column; gap: 5px; }
    .auth-label { font-size: 12px; color: var(--text2); letter-spacing: 0.3px; }
    .auth-input {
      background: var(--bg4); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 9px; padding: 11px 14px; color: var(--text);
      font-family: 'Sora', sans-serif; font-size: 14px; outline: none;
      transition: border-color 0.2s; width: 100%;
    }
    .auth-input:focus { border-color: rgba(255,255,255,0.22); box-shadow: 0 0 0 3px rgba(255,255,255,0.04); }
    .auth-btn {
      margin-top: 4px; padding: 12px; background: #fff; color: #000;
      border: none; border-radius: 9px; font-family: 'Sora', sans-serif;
      font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.18s ease;
      letter-spacing: -0.1px;
    }
    .auth-btn:hover { background: #ebebeb; transform: scale(0.985); }
    .auth-btn:active { transform: scale(0.97); background: #dcdcdc; }
    .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .auth-divider { display: flex; align-items: center; gap: 10px; margin: 2px 0; }
    .auth-divider::before, .auth-divider::after { content:''; flex:1; height:1px; background: rgba(255,255,255,0.07); }
    .auth-divider span { font-size: 11px; color: var(--text3); }
    .google-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 11px; border-radius: 9px; background: var(--bg3);
      border: 1px solid rgba(255,255,255,0.09); color: rgba(255,255,255,0.8);
      font-family: 'Sora', sans-serif; font-size: 13.5px; font-weight: 500;
      cursor: pointer; transition: all 0.2s; width: 100%;
    }
    .google-btn:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.14); color: var(--text); }
    .auth-error {
      font-size: 12px; color: #f87171;
      background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.15);
      border-radius: 7px; padding: 9px 12px; display: none;
    }
    .auth-error.show { display: block; }

    /* ── App Layout ── */
    .shell { display: flex; height: 100vh; height: 100dvh; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      background: #080808; border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      transform: translateX(-100%);
      transition: transform 0.28s cubic-bezier(.4,0,.2,1);
      position: fixed; left: 0; top: 0; bottom: 0; z-index: 50;
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 49; opacity: 0; pointer-events: none;
      transition: opacity 0.28s ease;
    }
    .sidebar-backdrop.show { opacity: 1; pointer-events: all; }

    .sidebar-header {
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .sidebar-title { font-size: 13px; font-weight: 500; color: var(--text2); letter-spacing: 0.3px; }
    .new-chat-btn {
      display: flex; align-items: center; gap: 6px;
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text2); padding: 6px 12px; border-radius: 8px;
      font-size: 12px; font-family: 'Sora', sans-serif; cursor: pointer;
      transition: all 0.2s;
    }
    .new-chat-btn:hover { background: var(--bg2); color: var(--text); border-color: var(--border2); }

    /* Search inside sidebar */
    .sidebar-search-wrap { padding: 12px 12px 8px; flex-shrink: 0; }
    .sidebar-search {
      width: 100%; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px; color: var(--text);
      font-family: 'Sora', sans-serif; font-size: 13px; outline: none;
      transition: border-color 0.2s;
    }
    .sidebar-search:focus { border-color: var(--border2); box-shadow: 0 0 0 2px rgba(255,255,255,0.03); }
    .sidebar-search::placeholder { color: var(--text3); }

    .sidebar-list { flex: 1; overflow-y: auto; padding: 6px 8px; }
    .sidebar-list::-webkit-scrollbar { width: 3px; }
    .sidebar-list::-webkit-scrollbar-thumb { background: var(--scroll); border-radius: 3px; }

    .chat-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 10px; border-radius: 9px; cursor: pointer;
      transition: background 0.12s ease; gap: 8px; margin-bottom: 2px;
    }
    .chat-item:hover { background: rgba(255,255,255,0.05); }
    .chat-item.active { background: #151515; }
    .chat-item-text {
      flex: 1; font-size: 13px; color: var(--text2);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .chat-item.active .chat-item-text { color: var(--text); }
    .chat-item-time { font-size: 10px; color: var(--text3); flex-shrink: 0; }
    .chat-item-del {
      background: none; border: none; color: var(--text3);
      cursor: pointer; padding: 2px 4px; border-radius: 4px;
      font-size: 14px; line-height: 1; opacity: 0;
      transition: opacity 0.15s, color 0.15s;
    }
    .chat-item:hover .chat-item-del { opacity: 1; }
    .chat-item-del:hover { color: #f87171; }

    .sidebar-empty { padding: 32px 16px; text-align: center; color: var(--text3); font-size: 13px; }

    /* Sidebar footer — user + logout */
    .sidebar-footer {
      border-top: 1px solid var(--border);
      padding: 12px 12px;
      flex-shrink: 0;
    }
    .sidebar-user {
      display: flex; align-items: center; gap: 10px;
      padding: 8px; border-radius: 9px; background: var(--bg3);
      border: 1px solid var(--border);
    }
    .sidebar-user-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      object-fit: cover; border: 1px solid var(--border2); flex-shrink: 0;
    }
    .sidebar-user-avatar-ph {
      width: 30px; height: 30px; border-radius: 50%;
      background: #1e1e1e; border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600; color: var(--text2); flex-shrink: 0;
    }
    .sidebar-user-name {
      flex: 1; font-size: 13px; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sidebar-logout-btn {
      background: none; border: none; color: var(--text3);
      cursor: pointer; padding: 4px; border-radius: 6px;
      display: flex; align-items: center; transition: color 0.15s;
    }
    .sidebar-logout-btn:hover { color: #f87171; }

    /* ── Main ── */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    /* ── Header ── */
    .header {
      height: var(--header-h);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      background: rgba(5,5,5,0.97); backdrop-filter: blur(24px);
      flex-shrink: 0; position: relative; z-index: 10;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .menu-btn {
      background: none; border: none; color: var(--text2);
      cursor: pointer; padding: 6px; border-radius: 8px;
      display: flex; align-items: center; transition: color 0.2s, background 0.2s;
    }
    .menu-btn:hover { color: var(--text); background: var(--bg3); }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 28px; height: 28px; }
    .logo-icon svg { width: 100%; height: 100%; }
    .logo-text { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
    .logo-badge {
      font-size: 10px; font-weight: 500; color: var(--text2);
      background: var(--bg3); border: 1px solid var(--border);
      padding: 2px 7px; border-radius: 20px; letter-spacing: 0.5px; text-transform: uppercase;
    }

    .header-right { display: flex; align-items: center; gap: 10px; }

    /* Search bar in header */
    .header-search-wrap { position: relative; display: flex; align-items: center; }
    .header-search-toggle {
      background: none; border: none; color: var(--text2);
      cursor: pointer; padding: 6px; border-radius: 8px;
      display: flex; align-items: center; transition: color 0.2s, background 0.2s;
    }
    .header-search-toggle:hover { color: var(--text); background: var(--bg3); }
    .search-box {
      position: absolute; right: 36px; top: 50%; transform: translateY(-50%);
      width: 0; overflow: hidden; transition: width 0.3s cubic-bezier(.4,0,.2,1);
      background: var(--bg2); border: 1px solid var(--border); border-radius: 9px;
    }
    .search-box.open { width: 200px; }
    .search-input {
      width: 100%; background: none; border: none; outline: none;
      color: var(--text); font-family: 'Sora', sans-serif; font-size: 13px;
      padding: 7px 12px;
    }
    .search-input::placeholder { color: var(--text3); }

    /* Model selector */
    .model-select {
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text2); font-family: 'Sora', sans-serif;
      font-size: 12px; padding: 5px 10px; border-radius: 8px;
      outline: none; cursor: pointer; transition: border-color 0.2s, color 0.2s;
      appearance: none; -webkit-appearance: none;
    }
    .model-select:hover { border-color: var(--border2); color: var(--text); }
    .model-select option { background: #0d0d0d; color: var(--text); }

    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #3ddc84; box-shadow: 0 0 7px rgba(61,220,132,0.6);
      animation: blink 2.5s ease-in-out infinite; flex-shrink: 0;
    }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.35;} }

    /* ── Messages ── */
    .messages {
      flex: 1; overflow-y: auto;
      padding: 28px 20px; display: flex; flex-direction: column; gap: 4px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--scroll); border-radius: 4px; }

    /* Highlighted search matches */
    .highlight { background: rgba(255,220,0,0.25); border-radius: 2px; padding: 0 1px; }

    /* Welcome */
    .welcome {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; flex: 1;
      gap: 14px; text-align: center; padding: 40px 20px;
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:none; } }
    .welcome-icon { width: 52px; height: 52px; margin-bottom: 2px; }
    .welcome h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.4px; }
    .welcome p { font-size: 14px; color: var(--text2); max-width: 340px; line-height: 1.7; font-weight: 300; }
    .suggestions { display: flex; flex-direction: column; gap: 7px; width: 100%; max-width: 440px; margin-top: 10px; }
    .suggestion-btn {
      background: var(--bg2); border: 1px solid rgba(255,255,255,0.07);
      color: var(--text2); padding: 11px 15px;
      border-radius: 11px; font-size: 13px; font-family: 'Sora', sans-serif;
      cursor: pointer; text-align: left; transition: all 0.18s ease;
      display: flex; align-items: center; gap: 10px;
    }
    .suggestion-btn:hover { background: #141414; border-color: rgba(255,255,255,0.13); color: var(--text); transform: translateX(4px); box-shadow: 0 2px 12px rgba(0,0,0,0.4); }
    .suggestion-btn span:first-child { font-size: 14px; flex-shrink: 0; }

    /* Messages */
    .message {
      display: flex; gap: 12px; max-width: 100%;
      animation: msgIn 0.28s ease both; padding: 3px 0;
    }
    @keyframes msgIn { from { opacity:0; transform:translateY(7px); } to { opacity:1; transform:none; } }
    .message.user { flex-direction: row-reverse; }
    .avatar {
      width: 28px; height: 28px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0; margin-top: 2px;
    }
    .avatar.ai { background: var(--bg3); border: 1px solid var(--border); }
    .avatar.user { background: #1c1c1c; border: 1px solid rgba(255,255,255,0.1); font-size: 11px; font-weight: 600; color: var(--text2); letter-spacing: 0.5px; }

    .msg-col { display: flex; flex-direction: column; max-width: 75%; }
    .message.user .msg-col { align-items: flex-end; }

    .bubble {
      padding: 12px 15px; border-radius: 14px;
      font-size: 14.5px; line-height: 1.72; font-weight: 300;
    }
    .message.ai .bubble { background: var(--ai-bubble); border: 1px solid rgba(255,255,255,0.07); border-radius: 4px 14px 14px 14px; }
    .message.user .bubble { background: #1c1c1c; border: 1px solid rgba(255,255,255,0.09); border-radius: 14px 4px 14px 14px; }

    .msg-meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .msg-time { font-size: 10.5px; color: var(--text3); }
    .copy-btn {
      background: none; border: none; color: var(--text3);
      cursor: pointer; padding: 2px 5px; border-radius: 5px;
      font-size: 11px; font-family: 'Sora', sans-serif;
      display: flex; align-items: center; gap: 3px;
      transition: color 0.15s, background 0.15s; opacity: 0;
    }
    .msg-col:hover .copy-btn { opacity: 1; }
    .copy-btn:hover { color: var(--text); background: var(--bg3); }
    .copy-btn.copied { color: #3ddc84; }

    /* Typing */
    .typing-indicator { display: flex; gap: 12px; align-items: flex-start; padding: 3px 0; animation: msgIn 0.28s ease both; }
    .typing-wrap { display: flex; flex-direction: column; gap: 4px; }
    .typing-label { font-size: 11px; color: var(--text3); padding-left: 2px; }
    .typing-dots { display: flex; gap: 5px; padding: 13px 16px; background: var(--ai-bubble); border: 1px solid var(--border); border-radius: 4px 14px 14px 14px; }
    .typing-dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--text3); animation: dot 1.4s ease-in-out infinite; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot { 0%,80%,100%{transform:scale(0.7);opacity:0.3;} 40%{transform:scale(1);opacity:1;} }

    /* Code blocks */
    .bubble pre {
      background: #080808; border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px; padding: 14px; margin: 8px 0;
      overflow-x: auto; font-family: 'JetBrains Mono', monospace;
      font-size: 12.5px; line-height: 1.65; position: relative;
    }
    .bubble code { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; background: rgba(255,255,255,0.06); padding: 1px 6px; border-radius: 4px; }
    .bubble pre code { background: none; padding: 0; }
    .bubble ul, .bubble ol { padding-left: 20px; margin: 6px 0; }
    .bubble li { margin-bottom: 3px; }
    .bubble p { margin-bottom: 6px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble strong { font-weight: 600; color: rgba(255,255,255,0.9); }

    /* ── Input ── */
    .input-area { padding: 12px 20px 18px; flex-shrink: 0; background: rgba(5,5,5,0.95); backdrop-filter: blur(20px); }
    .input-row { display: flex; align-items: flex-end; gap: 8px; }
    .input-wrapper {
      flex: 1; display: flex; align-items: flex-end; gap: 8px;
      background: var(--bg4); border: 1px solid var(--border);
      border-radius: 14px; padding: 9px 10px 9px 15px; transition: border-color 0.2s;
    }
    .input-wrapper:focus-within { border-color: rgba(255,255,255,0.18); box-shadow: 0 0 0 3px rgba(255,255,255,0.03); }
    #userInput {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-family: 'Sora', sans-serif;
      font-size: 14.5px; font-weight: 300; line-height: 1.6;
      resize: none; max-height: 160px; overflow-y: auto; padding: 2px 0;
    }
    #userInput::placeholder { color: var(--text3); }
    #userInput::-webkit-scrollbar { width: 3px; }
    #userInput::-webkit-scrollbar-thumb { background: var(--scroll); }
    .send-btn {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--text); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.2s; opacity: 0.15;
    }
    .send-btn.active { opacity: 1; }
    .send-btn:hover.active { background: #e0e0e0; transform: scale(0.96); }
    .send-btn svg { width: 14px; height: 14px; }
    .stop-btn {
      width: 32px; height: 32px; border-radius: 8px;
      background: rgba(255,255,255,0.08); border: 1px solid var(--border);
      cursor: pointer; display: none; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.2s; color: var(--text2);
    }
    .stop-btn.show { display: flex; }
    .stop-btn:hover { background: rgba(248,113,113,0.12); border-color: rgba(248,113,113,0.3); color: #f87171; }
    .footer-note { text-align: center; font-size: 11px; color: var(--text3); margin-top: 8px; letter-spacing: 0.2px; }

    /* Scroll-to-bottom button */
    #scroll-btn {
      position: fixed; bottom: 90px; right: 20px; z-index: 20;
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(20,20,20,0.95); border: 1px solid rgba(255,255,255,0.12);
      color: var(--text2); cursor: pointer;
      display: none; align-items: center; justify-content: center;
      transition: all 0.18s ease; box-shadow: 0 4px 20px rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
    }
    #scroll-btn.show { display: flex; }
    #scroll-btn:hover { background: rgba(30,30,30,0.98); color: var(--text); border-color: rgba(255,255,255,0.2); transform: translateY(-1px); }

    /* ── Responsive ── */
    @media (min-width: 900px) {
      .sidebar { position: relative; transform: translateX(0) !important; }
      .sidebar-backdrop { display: none !important; }
      .menu-btn { display: none; }
      .messages { padding: 28px 32px; }
      .input-area { padding: 12px 32px 20px; }
      .bubble { max-width: 100%; }
      .msg-col { max-width: 72%; }
    }
    @media (max-width: 899px) {
      .sidebar { position: fixed; }

</head>

<!-- Main Shell -->
<div class="shell">

  <!-- Main content -->
  <main class="main">
    <!-- Header -->
    <header class="header">

          <div class="logo-icon">
            <svg viewBox="0 0 32 32" fill="none">
              <circle cx="16" cy="16" r="14" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
              <circle cx="16" cy="16" r="9" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
              <circle cx="16" cy="16" r="3.5" fill="white" opacity="0.9"/>
              <line x1="16" y1="2" x2="16" y2="7" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="16" y1="25" x2="16" y2="30" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="2" y1="16" x2="7" y2="16" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="25" y1="16" x2="30" y2="16" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>

          <button class="header-search-toggle" onclick="toggleSearch()" title="Search">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>

        <div class="suggestions">

          <button class="suggestion-btn" onclick="useSuggestion(this)"><span>✦</span><span>Write a professional email for me</span></button>

            <svg viewBox="0 0 16 16" fill="none"><path d="M8 13V3M8 3L3.5 7.5M8 3L12.5 7.5" stroke="black" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>

<!-- Scroll button -->
<button id="scroll-btn" onclick="scrollDown(true)" title="Scroll to bottom">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
</button>

<script>
  // ── State ──
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('userInput');
  const sendBtn    = document.getElementById('sendBtn');
  const stopBtn    = document.getElementById('stopBtn');
  let isLoading    = false;
  let abortCtrl    = null;
  let chatHistory  = [];
  let currentChatId = null;
  let allChats     = {}; // { id: { id, title, messages:[], time } }

  // ── Storage keys ──
  const CHATS_KEY   = 'europa_chats_v2';
  const ACTIVE_KEY  = 'europa_active_chat';

  // ── Helpers ──
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }
  function toggleSend() {
    const has = inputEl.value.trim().length > 0;
    sendBtn.classList.toggle('active', has && !isLoading);
  }
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (inputEl.value.trim() && !isLoading) sendMessage();
    }
  }
  function useSuggestion(btn) {
    inputEl.value = btn.querySelector('span:last-child').textContent;
    autoResize(inputEl); toggleSend(); inputEl.focus();
  }
  function scrollDown(smooth) {
    messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: smooth ? 'smooth' : 'auto' });
  }
  function fmt(ts) {
    const d = new Date(ts);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }
  function fmtDate(ts) {
    const d = new Date(ts), n = new Date();
    if (d.toDateString() === n.toDateString()) return 'Today';
    const y = new Date(n); y.setDate(n.getDate()-1);
    if (d.toDateString() === y.toDateString()) return 'Yesterday';
    return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
  }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

  // ── Scroll-to-bottom button ──
  const scrollBtn = document.getElementById('scroll-btn');
  messagesEl.addEventListener('scroll', () => {
    const near = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 120;
    scrollBtn.classList.toggle('show', !near);
  });

  // ── Sidebar toggle ──
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebar-backdrop').classList.toggle('show');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-backdrop').classList.remove('show');
  }

  // ── Search in messages ──
  let searchOpen = false;
  function toggleSearch() {
    searchOpen = !searchOpen;
    const box = document.getElementById('search-box');
    box.classList.toggle('open', searchOpen);
    if (searchOpen) document.getElementById('search-input').focus();
    else { document.getElementById('search-input').value = ''; clearHighlights(); }
  }
  function closeSearch() {
    searchOpen = false;
    document.getElementById('search-box').classList.remove('open');
    document.getElementById('search-input').value = '';
    clearHighlights();
  }
  function clearHighlights() {
    document.querySelectorAll('.highlight').forEach(el => {
      const parent = el.parentNode;
      parent.replaceChild(document.createTextNode(el.textContent), el);
      parent.normalize();
    });
  }
  function searchMessages(q) {
    clearHighlights();
    if (!q.trim()) return;
    const re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi');
    document.querySelectorAll('.bubble').forEach(b => {
      b.childNodes.forEach(node => {
        if (node.nodeType === 3 && re.test(node.textContent)) {
          const frag = document.createDocumentFragment();
          let last = 0; let m;
          re.lastIndex = 0;
          while ((m = re.exec(node.textContent)) !== null) {
            frag.appendChild(document.createTextNode(node.textContent.slice(last, m.index)));
            const span = document.createElement('span');
            span.className = 'highlight'; span.textContent = m[0]; frag.appendChild(span);
            last = m.index + m[0].length;
          }
          frag.appendChild(document.createTextNode(node.textContent.slice(last)));
          node.parentNode.replaceChild(frag, node);
        }
      });
    });
    const first = document.querySelector('.highlight');
    if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  // ── Format text (markdown-like) ──
  function formatText(text) {
    let h = text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
        `<pre><code class="lang-${lang}">${code.trim()}</code></pre>`)
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/^### (.+)$/gm,'<strong>$1</strong>')
      .replace(/^## (.+)$/gm,'<strong>$1</strong>')
      .replace(/^# (.+)$/gm,'<strong>$1</strong>')
      .replace(/^[-•] (.+)$/gm,'<li>$1</li>')
      .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
      .replace(/\n\n+/g,'<br><br>').replace(/\n/g,'<br>');
    return h;
  }

  // ── Add message to DOM ──
  function addMessage(role, text, ts) {
    const w = document.getElementById('welcome');
    if (w) w.remove();

    const timestamp = ts || Date.now();
    const msg = document.createElement('div');
    msg.className = `message ${role}`;
    msg.dataset.ts = timestamp;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    avatar.innerHTML = role === 'ai'
      ? `<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="rgba(255,255,255,0.3)" stroke-width="1"/><circle cx="8" cy="8" r="2" fill="rgba(255,255,255,0.7)"/></svg>`
      : 'YOU';

    const col = document.createElement('div');
    col.className = 'msg-col';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = formatText(text);
    col.appendChild(bubble);

    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    const timeEl = document.createElement('span');
    timeEl.className = 'msg-time';
    timeEl.textContent = fmt(timestamp);
    meta.appendChild(timeEl);

    if (role === 'ai') {
      const copyBtn = document.createElement('button');
      copyBtn.className = 'copy-btn';
      copyBtn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`;
      copyBtn.onclick = () => {
        navigator.clipboard.writeText(text).then(() => {
          copyBtn.textContent = '✓ Copied'; copyBtn.classList.add('copied');
          setTimeout(() => { copyBtn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`; copyBtn.classList.remove('copied'); }, 2000);
        });
      };
      meta.appendChild(copyBtn);
    }
    col.appendChild(meta);

    msg.appendChild(avatar);
    msg.appendChild(col);
    messagesEl.appendChild(msg);
    scrollDown(false);
    return bubble;
  }

  // ── Typing indicator ──
  function showTyping() {
    const el = document.createElement('div');
    el.className = 'typing-indicator'; el.id = 'typing';
    el.innerHTML = `
      <div class="avatar ai"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="rgba(255,255,255,0.3)" stroke-width="1"/><circle cx="8" cy="8" r="2" fill="rgba(255,255,255,0.7)"/></svg></div>
      <div class="typing-wrap">
        <div class="typing-label">Europa is thinking…</div>
        <div class="typing-dots"><span></span><span></span><span></span></div>
      </div>`;
    messagesEl.appendChild(el); scrollDown(false);
  }
  function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

  // ── Stop generation ──
  function stopGeneration() {
    if (abortCtrl) { abortCtrl.abort(); abortCtrl = null; }
    removeTyping();
    isLoading = false;
    stopBtn.classList.remove('show');
    sendBtn.classList.remove('active');
    toggleSend();
  }

  // ── Chat storage ──
  function loadChats() {
    try { return JSON.parse(localStorage.getItem(CHATS_KEY) || '{}'); } catch { return {}; }
  }
  function saveChats() {
    try { localStorage.setItem(CHATS_KEY, JSON.stringify(allChats)); } catch {}
  }
  function getActiveId() { return localStorage.getItem(ACTIVE_KEY) || null; }
  function setActiveId(id) { localStorage.setItem(ACTIVE_KEY, id); }

  function renderSidebarList(filter) {
    const list = document.getElementById('sidebar-list');
    const ids = Object.keys(allChats).sort((a,b) => allChats[b].time - allChats[a].time);
    const q = (filter || '').toLowerCase();
    const filtered = ids.filter(id => {
      if (!q) return true;
      return allChats[id].title.toLowerCase().includes(q);
    });
    if (!filtered.length) {
      list.innerHTML = `<div class="sidebar-empty">${q ? 'No chats found' : 'No chats yet'}</div>`;
      return;
    }
    list.innerHTML = filtered.map(id => {
      const c = allChats[id];
      const active = id === currentChatId ? ' active' : '';
      return `<div class="chat-item${active}" onclick="loadChat('${id}')">
        <span class="chat-item-text">${escHtml(c.title)}</span>
        <span class="chat-item-time">${fmtDate(c.time)}</span>
        <button class="chat-item-del" onclick="deleteChat(event,'${id}')" title="Delete">×</button>
      </div>`;
    }).join('');
  }
  function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function filterChats(q) { renderSidebarList(q); }

  function deleteChat(e, id) {
    e.stopPropagation();
    delete allChats[id];
    saveChats();
    if (currentChatId === id) { newChat(); } else { renderSidebarList(); }
  }

  function newChat() {
    currentChatId = null;
    chatHistory = [];
    setActiveId('');
    messagesEl.innerHTML = `<div class="welcome" id="welcome">
      <svg class="welcome-icon" viewBox="0 0 56 56" fill="none">
        <circle cx="28" cy="28" r="26" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
        <circle cx="28" cy="28" r="16" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
        <circle cx="28" cy="28" r="5" fill="white" opacity="0.8"/>
        <line x1="28" y1="2" x2="28" y2="11" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="28" y1="45" x2="28" y2="54" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="2" y1="28" x2="11" y2="28" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="45" y1="28" x2="54" y2="28" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <h1>Europa AI</h1>
      <p>Your intelligent assistant. Ask me anything — I'm here to help you think, create, and explore.</p>
      <div class="suggestions">
        <button class="suggestion-btn" onclick="useSuggestion(this)"><span>✦</span><span>Explain quantum computing in simple terms</span></button>
        <button class="suggestion-btn" onclick="useSuggestion(this)"><span>✦</span><span>Write a professional email for me</span></button>
        <button class="suggestion-btn" onclick="useSuggestion(this)"><span>✦</span><span>Help me debug my code</span></button>
      </div>
    </div>`;
    renderSidebarList();
    if (window.innerWidth < 900) closeSidebar();
  }

  function loadChat(id) {
    const chat = allChats[id];
    if (!chat) return;
    currentChatId = id;
    setActiveId(id);
    chatHistory = chat.messages.map(m => ({ role: m.role, content: m.content }));
    messagesEl.innerHTML = '';
    chat.messages.forEach(m => {
      const r = m.role === 'assistant' ? 'ai' : 'user';
      addMessage(r, m.content, m.time);
    });
    renderSidebarList();
    if (window.innerWidth < 900) closeSidebar();
  }

  // ── Init chats ──
  allChats = loadChats();
  const savedActive = getActiveId();
  if (savedActive && allChats[savedActive]) {
    loadChat(savedActive);
  }
  renderSidebarList();

  // ── Send message ──
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;

    // Create new chat if needed
    if (!currentChatId) {
      currentChatId = uid();
      allChats[currentChatId] = {
        id: currentChatId,
        title: text.slice(0, 40) + (text.length > 40 ? '…' : ''),
        messages: [],
        time: Date.now()
      };
      setActiveId(currentChatId);
    }

    isLoading = true;
    abortCtrl = new AbortController();
    inputEl.value = ''; inputEl.style.height = 'auto';
    sendBtn.classList.remove('active');
    stopBtn.classList.add('show');

    const ts = Date.now();
    addMessage('user', text, ts);
    allChats[currentChatId].messages.push({ role: 'user', content: text, time: ts });
    allChats[currentChatId].time = ts;
    chatHistory.push({ role: 'user', content: text });
    if (chatHistory.length > 16) chatHistory.splice(0, chatHistory.length - 16);
    saveChats(); renderSidebarList();

    showTyping();
    const model = document.getElementById('modelSelect').value;

    try {
      const res = await fetch('https://chat.tera-naam.workers.dev', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history: chatHistory.slice(-8), model }),
        signal: abortCtrl.signal
      });
      const data = await res.json();
      removeTyping();
      const reply = data.reply || 'Something went wrong. Please try again.';
      const ats = Date.now();
      addMessage('ai', reply, ats);
      allChats[currentChatId].messages.push({ role: 'assistant', content: reply, time: ats });
      chatHistory.push({ role: 'assistant', content: reply });
      if (chatHistory.length > 16) chatHistory.splice(0, chatHistory.length - 16);
      saveChats(); renderSidebarList();
    } catch (err) {
      removeTyping();
      if (err.name !== 'AbortError') {
        addMessage('ai', 'Connection error. Please check your internet and try again.', Date.now());
      }
    } finally {
      isLoading = false; abortCtrl = null;
      stopBtn.classList.remove('show');
      toggleSend(); inputEl.focus();
    }
  }
</script>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getAuth, onAuthStateChanged,
    signInWithEmailAndPassword, createUserWithEmailAndPassword,
    signInWithPopup, GoogleAuthProvider,
    updateProfile, signOut
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB86hgovk2V2MR97Iwnk2JyUtQVJzY6SD8",
    authDomain: "europa-ai-8be1b.firebaseapp.com",
    projectId: "europa-ai-8be1b",
    storageBucket: "europa-ai-8be1b.firebasestorage.app",
    messagingSenderId: "844685637054",
    appId: "1:844685637054:web:b479203ac6fc0d0d4935ef"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  // ── Auth helpers ──
  function showAuth() {
    const el = document.getElementById('auth-overlay');
    el.classList.add('visible');
  }
  function hideAuth() {
    const el = document.getElementById('auth-overlay');
    el.classList.remove('visible');
  }
  function showError(msg) {
    const el = document.getElementById('auth-error');
    el.textContent = msg; el.classList.add('show');
  }
  function clearError() {
    const el = document.getElementById('auth-error');
    el.textContent = ''; el.classList.remove('show');
  }
  function setLoading(btnId, on) {
    const btn = document.getElementById(btnId);
    btn.disabled = on;
    btn.textContent = on ? 'Please wait…' : btn.dataset.label;
  }

  // ── Tab switch ──
  window.switchTab = function(tab) {
    clearError();
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.auth-form').forEach(f => f.classList.add('hidden'));
    if (tab === 'login') {
      document.querySelectorAll('.auth-tab')[0].classList.add('active');
      document.getElementById('login-form').classList.remove('hidden');
    } else {
      document.querySelectorAll('.auth-tab')[1].classList.add('active');
      document.getElementById('signup-form').classList.remove('hidden');
    }
  };

  // ── Email login ──
  window.emailLogin = async function() {
    clearError();
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-pass').value;
    if (!email || !pass) { showError('Please fill in all fields.'); return; }
    setLoading('login-btn', true);
    try { await signInWithEmailAndPassword(auth, email, pass); }
    catch(e) { showError(friendlyError(e.code)); }
    finally { setLoading('login-btn', false); }
  };

  // ── Email signup ──
  window.emailSignup = async function() {
    clearError();
    const name  = document.getElementById('signup-name').value.trim();
    const email = document.getElementById('signup-email').value.trim();
    const pass  = document.getElementById('signup-pass').value;
    if (!name || !email || !pass) { showError('Please fill in all fields.'); return; }
    if (pass.length < 6) { showError('Password must be at least 6 characters.'); return; }
    setLoading('signup-btn', true);
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(cred.user, { displayName: name }).catch(()=>{});
    } catch(e) { showError(friendlyError(e.code)); }
    finally { setLoading('signup-btn', false); }
  };

  // ── Google login ──
  window.googleLogin = async function() {
    clearError();
    try { await signInWithPopup(auth, provider); }
    catch(e) { if (e.code !== 'auth/popup-closed-by-user') showError(friendlyError(e.code)); }
  };

  // ── Auth state — NO FLICKER ──
  // Loading screen shows until Firebase resolves auth, THEN we decide what to show
  onAuthStateChanged(auth, (user) => {
    // Always hide loading screen first
    const ls = document.getElementById('loading-screen');
    ls.classList.add('hide');
    setTimeout(() => ls.style.display = 'none', 380);

    if (user) {
      hideAuth();
      renderSidebarUser(user);
    } else {
      showAuth();
    }
  });

  function renderSidebarUser(user) {
    const initial = (user.displayName || user.email || 'U')[0].toUpperCase();
    const name    = user.displayName || user.email || 'User';
    const footer  = document.getElementById('sidebar-footer');
    footer.innerHTML = `
      <div class="sidebar-user">
        ${user.photoURL
          ? `<img class="sidebar-user-avatar" src="${user.photoURL}" alt=""/>`
          : `<div class="sidebar-user-avatar-ph">${initial}</div>`}
        <span class="sidebar-user-name">${escHtml(name)}</span>
        <button class="sidebar-logout-btn" onclick="doLogout()" title="Sign out">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>`;
  }

  window.doLogout = async function() {
    await signOut(auth);
  };

  function friendlyError(code) {
    const map = {
      'auth/invalid-email':          'Invalid email address.',
      'auth/user-not-found':         'No account found with this email.',
      'auth/wrong-password':         'Incorrect password.',
      'auth/email-already-in-use':   'An account with this email already exists.',
      'auth/weak-password':          'Password too weak (min 6 chars).',
      'auth/too-many-requests':      'Too many attempts. Try again later.',
      'auth/network-request-failed': 'Network error. Check your connection.',
      'auth/invalid-credential':     'Incorrect email or password.',
      'auth/missing-password':       'Please enter your password.',
      'auth/missing-email':          'Please enter your email.',
      'auth/operation-not-allowed':  'This sign-in method is not enabled.',
    };
    return map[code] || `Error: ${code}`;
  }
</script>
